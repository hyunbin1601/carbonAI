branding:
  appName: "후시봇"
  logoPath: "/logo.png"
  logoWidth: 28
  logoHeight: 28
  description: "탄소배출 관리부터 배출권 거래까지 안내해드립니다"
  fullDescription: "/full-description.md"
  chatOpeners:
    - "📊 탄소 배출량 측정 서비스"
    - "💰 배출권을 판매하고 싶어요"
    - "🛒 배출권을 구매하고 싶어요"
    - "👤 상담원과 연결해주세요"

buttons:
  enableFileUpload: true
  chatInputPlaceholder: "궁금한 내용을 물어보세요."

threads:
  showHistory: true
  enableDeletion: true
  enableTitleEdit: true
  autoGenerateTitles: false
  sidebarOpenByDefault: true

theme:
  fontFamily: "pretendard"
  fontSize: "large"
  colorScheme: "light"

ui:
  autoCollapseToolCalls: false
  chatWidth: "default"
