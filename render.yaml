services:
  # Python 백엔드 (LangGraph)
  - type: web
    name: carbon-ai-backend
    runtime: python
    rootDir: react-agent
    buildCommand: pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt && pip install --no-cache-dir -e .
    startCommand: langgraph up
    healthCheckPath: /ok
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_PROJECT
        value: "CarbonAI-Production"
      - key: NETZ_MCP_URL
        value: "https://hooxi.shinssy.com"
      - key: NETZ_MCP_ENABLED
        value: "true"
      - key: NETZ_ENTERPRISE_ID
        value: "1"
